services:
  homebridge:
    image: ${HOMEBRIDGE_IMAGE:-homebridge/homebridge:beta}
    hostname: test-homebridge-docker
    restart: always
    network_mode: host
    volumes:
      - ./volumes/homebridge:/homebridge
    environment:
      - TZ=America/Toronto
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '1'
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8581 || exit 1"]
      interval: 60s
      retries: 5
      start_period: 300s
      timeout: 2s